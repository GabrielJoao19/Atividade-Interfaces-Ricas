<div class="bg-gray-200">
  <h1 class="p-10 text-2xl font-bold text-black">CRUD com Angular e PrimeNG</h1>
</div>

<div class="p-10 flex flex-col gap-4">
  <label class="font-bold">Nome do Aluno:</label>
  <input type="text" pInputText class="border-2 border-gray-400" [(ngModel)]="novo_aluno"
    (keyup.enter)="adicionar_aluno()" />
  <p-button label="Salvar" icon="pi pi-check" (onClick)="adicionar_aluno()"></p-button>
</div>

<div class="p-10">
  <p-table [value]="alunos()" [tableStyle]="{ 'min-width': '50rem' }">
    <ng-template #header>
      <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Ações</th>
      </tr>
    </ng-template>
    <ng-template #body let-aluno>
      <tr>
        <td>{{ aluno.id }}</td>
        <td>{{ aluno.nome }}</td>
        <td class="flex gap-2">
          <p-button icon="pi pi-pencil" severity="help" (onClick)="editar_aluno(aluno)"></p-button>
          <p-button icon="pi pi-trash" severity="danger" (onClick)="remover_aluno(aluno.id)"></p-button>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
