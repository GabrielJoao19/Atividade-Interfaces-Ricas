<div class="bg-slate-800 p-8 text-white shadow-md">
  <h1 class="text-3xl font-extrabold tracking-tight">Gerenciamento Acadêmico</h1>
  <p class="text-sm text-slate-400 mt-1">CRUD com Angular 21, PrimeNG e Tailwind CSS</p>
</div>

<div class="p-8 max-w-2xl mx-auto mt-6 bg-white rounded-xl shadow-sm border border-slate-100 flex flex-col gap-6">

  <div class="flex flex-col gap-2">
    <label class="font-semibold text-slate-700">Nome do Aluno:</label>
    <input type="text" pInputText
      class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
      [(ngModel)]="novo_aluno" />
  </div>

  <div class="flex flex-col gap-2">
    <label class="font-semibold text-slate-700">Quantidade de matérias cursadas:</label>
    <input type="number" pInputText
      class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
      [(ngModel)]="novo_materiasCursadas" />
  </div>

  <div class="flex flex-col gap-2">
    <label class="font-semibold text-slate-700">Status do Aluno:</label>
    <select
      class="w-full px-4 py-3 border border-slate-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
      [(ngModel)]="novo_ativo">
      <option [ngValue]="true">Ativo</option>
      <option [ngValue]="false">Inativo</option>
    </select>
  </div>

  <p-button
    styleClass="w-full p-3 font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition border-none shadow-sm"
    [label]="aluno_selecionado ? 'Atualizar Aluno' : 'Salvar Aluno'" icon="pi pi-check" (onClick)="adicionar_aluno()">
  </p-button>

</div>

<div class="p-8 max-w-6xl mx-auto">
  <p-table [value]="alunos()" [tableStyle]="{ 'min-width': '50rem' }">
    <ng-template #header>
      <tr>
        <th class="bg-slate-100 p-4 font-bold text-slate-700">ID</th>
        <th class="bg-slate-100 p-4 font-bold text-slate-700">Nome</th>
        <th class="bg-slate-100 p-4 font-bold text-slate-700">Matérias</th>
        <th class="bg-slate-100 p-4 font-bold text-slate-700">Status</th>
        <th class="bg-slate-100 p-4 font-bold text-slate-700">Ações</th>
      </tr>
    </ng-template>

    <ng-template #body let-aluno>
      <tr class="border-b border-slate-200 hover:bg-slate-50 transition">
        <td class="p-4 text-slate-800">{{ aluno.id }}</td>
        <td class="p-4 font-medium text-slate-900">{{ aluno.nome }}</td>
        <td class="p-4 text-slate-600">{{ aluno.materiasCursadas }}</td>
        <td class="p-4">
          <span class="px-3 py-1 text-sm font-medium rounded-full"
            [ngClass]="aluno.ativo ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800'">
            {{ aluno.ativo ? 'Ativo' : 'Inativo' }}
          </span>
        </td>
        <td class="p-4 flex gap-2">
          <p-button icon="pi pi-pencil" severity="secondary" (onClick)="editar_aluno(aluno)"></p-button>
          <p-button icon="pi pi-trash" severity="danger" (onClick)="remover_aluno(aluno.id)"></p-button>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
