<div class="bg-gray-200">
  <h1 class="p-10 text-2xl font-bold text-black">CRUD com Angular e PrimeNG</h1>
</div>

<div class="p-10 flex flex-col gap-4 max-w-lg">

  <div class="flex flex-col gap-1">
    <label class="font-bold">Nome do Aluno:</label>
    <input type="text" pInputText class="border-2 border-gray-400 p-2" [(ngModel)]="novo_aluno" />
  </div>

  <div class="flex flex-col gap-1">
    <label class="font-bold">Quantidade de matérias cursadas:</label>
    <input type="number" pInputText class="border-2 border-gray-400 p-2" [(ngModel)]="novo_materiasCursadas" />
  </div>

  <div class="flex flex-col gap-1">
    <label class="font-bold">Status (Ativo/Inativo):</label>
    <select class="border-2 border-gray-400 p-2 rounded" [(ngModel)]="novo_ativo">
      <option [ngValue]="true">Ativo</option>
      <option [ngValue]="false">Inativo</option>
    </select>
  </div>

  <p-button [label]="aluno_selecionado ? 'Atualizar' : 'Salvar'" icon="pi pi-check" (onClick)="adicionar_aluno()">
  </p-button>

</div>

<div class="p-10">
  <p-table [value]="alunos()" [tableStyle]="{ 'min-width': '50rem' }">
    <ng-template #header>
      <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Matérias</th>
        <th>Status</th>
        <th>Ações</th>
      </tr>
    </ng-template>
    <ng-template #body let-aluno>
      <tr>
        <td>{{ aluno.id }}</td>
        <td>{{ aluno.nome }}</td>
        <td>{{ aluno.materiasCursadas }}</td>
        <td>
          <span [style.color]="aluno.ativo ? 'green' : 'red'">
            {{ aluno.ativo ? 'Ativo' : 'Inativo' }}
          </span>
        </td>
        <td class="flex gap-2">
          <p-button icon="pi pi-pencil" severity="help" (onClick)="editar_aluno(aluno)"></p-button>
          <p-button icon="pi pi-trash" severity="danger" (onClick)="remover_aluno(aluno.id)"></p-button>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
